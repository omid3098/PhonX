name: Build phonxcore AAR

on:
  push:
    paths:
      - "phonxcore/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: phonxcore/go.sum

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;27.2.12479018"

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build AAR
        run: |
          cd phonxcore && gomobile bind \
            -v \
            -mod=vendor \
            -tags "PSIPHON_DISABLE_INPROXY" \
            -target=android/arm,android/arm64 \
            -androidapi 24 \
            -ldflags="-s -w" \
            -o phonxcore.aar \
            ./

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonxcore.aar
          path: phonxcore/phonxcore.aar
          if-no-files-found: error
