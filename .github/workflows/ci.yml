name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build the Go-based phonxcore AAR ──────────────────────────
  build-aar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: phonxcore/go.sum

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;27.2.12479018"

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Build AAR
        working-directory: phonxcore
        run: |
          set -euo pipefail
          NDK_TC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          WORK=$(mktemp -d)
          trap 'rm -rf "$WORK" cmd' EXIT

          # 1. Generate Go/Java bindings with gobind
          echo "==> Step 1: Running gobind..."
          GOFLAGS="-mod=readonly" go run \
            golang.org/x/mobile/cmd/gobind@v0.0.0-20260204172633-1dceadbbeea3 \
            -lang=go,java -outdir="$WORK" -tags=PSIPHON_DISABLE_INPROXY phonxcore

          # 2. Place generated code inside module for vendor-mode build
          echo "==> Step 2: Setting up gobind code..."
          mkdir -p cmd/gobind
          find "$WORK/src/gobind" -maxdepth 1 -type f \( -name '*.go' -o -name '*.c' -o -name '*.h' \) \
            -exec cp {} cmd/gobind/ \;

          # 3. Vendor and patch (after gobind code exists, so bind/java import is seen)
          echo "==> Step 3: Vendoring..."
          GOOS=android go mod vendor
          bash ci_vendor_patches.sh

          # 4. Cross-compile .so for each architecture
          for arch in arm arm64; do
            echo "==> Step 4: Building android/$arch..."
            case "$arch" in
              arm)
                CC="$NDK_TC/armv7a-linux-androideabi24-clang"
                CXX="$NDK_TC/armv7a-linux-androideabi24-clang++"
                JNI=armeabi-v7a; export GOARM=7 ;;
              arm64)
                CC="$NDK_TC/aarch64-linux-android24-clang"
                CXX="$NDK_TC/aarch64-linux-android24-clang++"
                JNI=arm64-v8a; unset GOARM 2>/dev/null || true ;;
            esac
            mkdir -p "$WORK/aar/jni/$JNI"
            GOOS=android GOARCH=$arch CGO_ENABLED=1 CC="$CC" CXX="$CXX" \
              go build -mod=vendor -tags PSIPHON_DISABLE_INPROXY \
                -trimpath -ldflags="-s -w -checklinkname=0 -extldflags '-Wl,-z,max-page-size=16384'" \
                -buildmode=c-shared \
                -o "$WORK/aar/jni/$JNI/libgojni.so" ./cmd/gobind
          done

          # 5. Package AAR
          echo "==> Step 5: Packaging AAR..."
          cat > "$WORK/aar/AndroidManifest.xml" <<'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="go"/>
          XML

          ANDROID_JAR=$(find "$ANDROID_HOME/platforms" -name android.jar | sort -rV | head -1)
          mkdir -p "$WORK/classes"
          find "$WORK/java" -name "*.java" > "$WORK/sources.txt"
          javac -source 8 -target 8 -classpath "$ANDROID_JAR" \
            -d "$WORK/classes" @"$WORK/sources.txt"
          (cd "$WORK/classes" && jar cf "$WORK/aar/classes.jar" .)
          (cd "$WORK/aar" && jar cf "$OLDPWD/phonxcore.aar" AndroidManifest.xml classes.jar jni)
          ls -lh phonxcore.aar

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonxcore-aar
          path: phonxcore/phonxcore.aar
          if-no-files-found: error
          retention-days: 7

  # ── Run tests and build debug APKs ────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    needs: build-aar
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36"

      - name: Download phonxcore AAR
        uses: actions/download-artifact@v4
        with:
          name: phonxcore-aar
          path: app/libs

      - name: Verify AAR is in place
        run: ls -lh app/libs/phonxcore.aar

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: gradle testDebugUnitTest jacocoTestReport --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn
          retention-days: 7

      - name: Build debug APKs
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
