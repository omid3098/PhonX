name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build the Go-based phonxcore AAR ──────────────────────────
  build-aar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: phonxcore/go.sum

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;27.2.12479018"

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install gomobile and gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Vendor Go modules
        working-directory: phonxcore
        run: go mod vendor

      - name: Build AAR
        working-directory: phonxcore
        run: |
          gomobile bind \
            -v \
            -mod=vendor \
            -tags "PSIPHON_DISABLE_INPROXY" \
            -target=android/arm,android/arm64 \
            -androidapi 24 \
            -ldflags="-s -w" \
            -o phonxcore.aar \
            ./

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonxcore-aar
          path: phonxcore/phonxcore.aar
          if-no-files-found: error
          retention-days: 7

  # ── Run tests and build debug APKs ────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    needs: build-aar
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36"

      - name: Download phonxcore AAR
        uses: actions/download-artifact@v4
        with:
          name: phonxcore-aar
          path: app/libs

      - name: Verify AAR is in place
        run: ls -lh app/libs/phonxcore.aar

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest jacocoTestReport --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn
          retention-days: 7

      - name: Build debug APKs
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
